name: Actualizar Datos Multiriesgo

on:
  schedule:
    - cron: '0 */6 * * *'  # Cada 6 horas
  workflow_dispatch:        # Para ejecutar manualmente
  push:
    branches: [ main ]

jobs:
  actualizar:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Instalar dependencias
      run: |
        pip install requests beautifulsoup4 pandas geopandas
    
    - name: Ejecutar descargador
      env:
        MULTIRIESGO_USER: ${{ secrets.MULTIRIESGO_USER }}
        MULTIRIESGO_PASS: ${{ secrets.MULTIRIESGO_PASS }}
      run: python descargador_automatico.py
    
    - name: Renombrar archivo unificado
      run: |
        # Buscar el archivo unificado más reciente
        latest_unified=$(ls -t geojson_unificado_*.geojson | head -1)
        if [ -f "$latest_unified" ]; then
          cp "$latest_unified" geojson_unificado_actual.geojson
          echo "✅ Archivo renombrado a: geojson_unificado_actual.geojson"
        else
          echo "❌ No se encontró archivo unificado"
          exit 1
        fi
    
    - name: Configurar Git
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
    
    - name: Subir cambios
      run: |
        git add geojson_unificado_actual.geojson
        git commit -m "📊 Actualización automática $(date +'%Y-%m-%d %H:%M')" || echo "Sin cambios"
        git push || echo "Nada para subir"
