name: Actualizar Datos Multiriesgo

on:
  schedule:
    - cron: '0 */6 * * *'  # Cada 6 horas
  workflow_dispatch:        # Para ejecutar manualmente
  push:
    branches: [ main ]

jobs:
  actualizar:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Instalar dependencias
      run: |
        pip install requests beautifulsoup4 pandas geopandas
    
    - name: Ejecutar descargador
      env:
        MULTIRIESGO_USER: ${{ secrets.MULTIRIESGO_USER }}
        MULTIRIESGO_PASS: ${{ secrets.MULTIRIESGO_PASS }}
      run: python descargador_automatico.py
    
    - name: Mostrar archivos generados
      run: |
        echo "📁 Archivos generados:"
        ls -la *.geojson *.csv 2>/dev/null || echo "No hay archivos"
    
    - name: Configurar Git
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
    
    - name: Subir cambios
      run: |
        git add geojson_unificado_actual.geojson
        git commit -m "📊 Actualización automática $(date +'%Y-%m-%d %H:%M')" || echo "Sin cambios"
        git push || echo "Nada para subir"
