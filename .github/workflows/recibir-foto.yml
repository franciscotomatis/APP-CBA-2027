name: Recibir Foto desde App

on:
  workflow_dispatch:
    inputs:
      foto_base64:
        description: 'Foto en base64'
        required: true
      nombre_archivo:
        description: 'Nombre del archivo'
        required: true
      latitud:
        description: 'Latitud GPS'
        required: false
        default: '-31.4201'
      longitud:
        description: 'Longitud GPS'
        required: false
        default: '-64.1888'

jobs:
  guardar-foto:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Guardar foto recibida
      run: |
        echo "📸 Recibiendo foto: ${{ github.event.inputs.nombre_archivo }}"
        
        echo "${{ github.event.inputs.foto_base64 }}" | base64 --decode > "fotos_subidas/${{ github.event.inputs.nombre_archivo }}"
        
        echo '{
          "nombre": "${{ github.event.inputs.nombre_archivo }}",
          "lat": ${{ github.event.inputs.latitud }},
          "lon": ${{ github.event.inputs.longitud }},
          "fecha": "'$(date -Iseconds)'",
          "subido_via": "app_web"
        }' > "fotos_subidas/${{ github.event.inputs.nombre_archivo }}.json"
        
        echo "✅ Foto guardada en fotos_subidas/"
    
    - name: Commit y push
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add fotos_subidas/
        git commit -m "📸 Nueva foto desde app web" || echo "No hay cambios"
        git push
    
    - name: Disparar procesamiento
      run: |
        echo "🔄 Disparando workflow de procesamiento..."
        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/procesar-fotos-nuevas.yml/dispatches \
          -d '{"ref":"main"}'
